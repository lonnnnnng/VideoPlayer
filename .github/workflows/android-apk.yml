name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "ZYPlayer/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ZYPlayer/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ZYPlayer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore debug signing key
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            echo "No custom debug signing key configured; using default runner debug key."
            exit 0
          fi
          mkdir -p "$HOME/.android"
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"
          chmod 600 "$HOME/.android/debug.keystore"
          echo "ANDROID_DEBUG_KEYSTORE_PATH=$HOME/.android/debug.keystore" >> "$GITHUB_ENV"
          keytool -list -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey \
            | grep -E "SHA1|SHA256"

      - name: Restore release signing key
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ] ||
             [ -z "$ANDROID_RELEASE_KEYSTORE_PASSWORD" ] ||
             [ -z "$ANDROID_RELEASE_KEY_ALIAS" ] ||
             [ -z "$ANDROID_RELEASE_KEY_PASSWORD" ]; then
            echo "Release signing secrets are required for tag builds." >&2
            exit 1
          fi

          mkdir -p "$HOME/.android"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/zyplayer-release.jks"
          chmod 600 "$HOME/.android/zyplayer-release.jks"

          {
            echo "ANDROID_RELEASE_KEYSTORE_PATH=$HOME/.android/zyplayer-release.jks"
            echo "ANDROID_RELEASE_KEYSTORE_PASSWORD=$ANDROID_RELEASE_KEYSTORE_PASSWORD"
            echo "ANDROID_RELEASE_KEY_ALIAS=$ANDROID_RELEASE_KEY_ALIAS"
            echo "ANDROID_RELEASE_KEY_PASSWORD=$ANDROID_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

          keytool -list -v \
            -keystore "$HOME/.android/zyplayer-release.jks" \
            -storepass "$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_RELEASE_KEY_ALIAS" \
            | grep -E "SHA1|SHA256"

      - name: Derive release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="$(echo "$VERSION_NAME" | awk -F. '{ printf "%d%03d%03d", $1, $2, $3 }')"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify debug APK signing certificate
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/debug/app-debug.apk \
            | grep -E "SHA-1|SHA-256"

      - name: Verify release APK signing certificate
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk \
            | grep -E "SHA-1|SHA-256"

      - name: Rename release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/ZYPlayer-${GITHUB_REF_NAME}.apk"

      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ZYPlayer-debug-apk
          path: ZYPlayer/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ZYPlayer-release-apk
          path: ZYPlayer/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ZYPlayer ${{ github.ref_name }}
          body: |
            ZYPlayer ${{ github.ref_name }}

            - 视频源管理支持通过 URL 批量导入资源站配置
            - 自动识别并兼容 JSON 与 Base58 编码的 api_site 源配置
            - 新增视频源一键批量检测，验证连通性和搜索能力，失败源自动禁用
            - 优化视频源管理列表密度，按钮尺寸更紧凑
            - 移除剪切板 m3u/m3u8 链接的全局监听和自动跳转逻辑
          files: ZYPlayer/release/*.apk
